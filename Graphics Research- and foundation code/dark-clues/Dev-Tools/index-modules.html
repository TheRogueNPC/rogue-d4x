<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Dark Clues - Module Dev</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <base href="/">
    <link rel="shortcut icon" type="image/png" href="favicon.png">
    <script>
        window.addEventListener("touchmove", function(e) { e.preventDefault(); }, { capture: false, passive: false });
    </script>
    <style>
        html, body { margin:0; padding:0; height:100%; overflow:hidden; }
        #openfl-content { background:#000; width:100%; height:100%; }
        @font-face {
            font-family:'Share Tech Regular';
            src: url('assets/ShareTech-Regular.eot?#iefix') format('embedded-opentype'),
                 url('assets/ShareTech-Regular.woff') format('woff'),
                 url('assets/ShareTech-Regular.ttf') format('truetype'),
                 url('assets/ShareTech-Regular.svg#Share%20Tech%20Regular') format('svg');
            font-weight:normal; font-style:normal;
        }
    </style>
</head>
<body>
    <noscript>Enable JavaScript</noscript>
    <div id="openfl-content"></div>

    <!--
    No import map needed: modules/index.js now uses paths relative to its
    own location (modules/), so "modules/index.js" below resolves every
    nested import correctly on its own. See modules/DECISIONS.md for why
    the previous import-map workaround never actually worked (its "./"
    keys were resolved relative to this document, not to modules/index.js,
    so they could never match the specifiers written there).
    -->

    <script src="mp3_patch.js"></script>

    <script type="module">
        // Import the module entry point. Module specifiers (unlike HTML
        // attributes / CSS url(), which <base href> does affect) must
        // start with "/", "./", or "../" — a bare "modules/index.js"
        // is parsed as a package-style specifier and fails outright.
        import "/modules/index.js";

        // Dev helpers
        window.devLog = function() { console.log.apply(console, ['[Dev]'].concat([].slice.call(arguments))); };
        window.devClear = function() { console.clear(); };

        // Expose game globals
        setInterval(function() {
            if (window.game && window.game.sevendrl) {
                window.sevendrl = window.game.sevendrl;
                window.hero = window.sevendrl.hero;
                window.devLog('Game ready');
            }
        }, 200);

        // Boot
        var checkLime = setInterval(function() {
            if (typeof lime !== 'undefined') {
                clearInterval(checkLime);
                lime.embed("SevenDRL", "openfl-content", 0, 0, { parameters: {} });
            }
        }, 100);
    </script>
</body>
</html>
